---
# Production environment override
services:
  php:
    image: ${IMAGES_PREFIX:-}app-php-prod
    build:
      context: .
      target: frankenphp_prod
    environment:
      APP_ENV: prod
      APP_DEBUG: 0
      SERVER_NAME: ${SERVER_NAME:-oz.webmove.fr}, php:80
      DEFAULT_URI: ${DEFAULT_URI:-https://oz.webmove.fr}
      MERCURE_PUBLIC_URL: ${CADDY_MERCURE_PUBLIC_URL:-https://oz.webmove.fr/.well-known/mercure}
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your production environment}@database:5432/${POSTGRES_DB:-app}?serverVersion=${POSTGRES_VERSION:-16}&charset=${POSTGRES_CHARSET:-utf8}
      APP_SECRET: ${APP_SECRET:?Set APP_SECRET in your production environment}
      APP_DIRECTRICE_PASSWORD_HASH: ${APP_DIRECTRICE_PASSWORD_HASH:?Set APP_DIRECTRICE_PASSWORD_HASH in your production environment}
      APP_ADJOINT_PASSWORD_HASH: ${APP_ADJOINT_PASSWORD_HASH:?Set APP_ADJOINT_PASSWORD_HASH in your production environment}
      MERCURE_PUBLISHER_JWT_KEY: ${CADDY_MERCURE_JWT_SECRET:?Set CADDY_MERCURE_JWT_SECRET in your production environment}
      MERCURE_SUBSCRIBER_JWT_KEY: ${CADDY_MERCURE_JWT_SECRET:?Set CADDY_MERCURE_JWT_SECRET in your production environment}

  database:
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your production environment}
      POSTGRES_USER: ${POSTGRES_USER:-app}
